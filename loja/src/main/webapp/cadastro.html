<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
		body {
			background-color: #bfc3c9;
		}

		.header {
		 
  background: linear-gradient(
    to bottom,
    #8B1C2D 0%,     /* a cor que vc imaginar */
    #8B1C2D 20%,
    #0A1F44 20%,    /* eu acho que é azul */
    #0A1F44 80%,
    #8B1C2D 80%,    /* a cor que vc imaginar */
    #8B1C2D 100%
  );
			display:flex;
			align-items: center;
			justify-content: center;
		}

		.header img {
			max-height: 200px;
		}

		/* CARD */
		.card {
			max-width: 200px;
			margin: auto;
			border-radius: 15px;
			transition: 0.3s;
		}

		.card:hover {
			transform: scale(1.05);
		}

		/* IMAGEM */
		.card-img-top {
			height: 150px;
			object-fit: contain;
			padding: 10px;
		}

		/* TEXTO */
		.card-body {
			padding: 8px;
		}

		/* BOTÃO */
		.btn-custom {
			background-color: #1f2b5c;
			color: white;
			border-radius: 30px;
			padding: 10px 30px;
		}

		.btn-custom:hover {
			background-color: #162047;
		}
	</style>

</head>

<body class="bg-secondary-subtle">

<!-- HEADER -->
<div class="header">
  <img src="img/zyro.png" alt="logo" class="img-fluid" >
</div>

<!-- TÍTULO -->
<div class="container text-center mt-4">
  <h2 class="text-danger">Cadastro de Produtos</h2>
</div>

<!-- FORM -->
<div class="container mt-5">
  <div class="row align-items-center">

    <div class="col-md-6">

      <!-- 🔥 CORRIGIDO AQUI -->
      <form action="insert" method="post">

        <!-- ID -->
        <div class="row mb-4">
          <label class="col-sm-4 col-form-label text-danger">
            Código da Roupa
          </label>
          <div class="col-sm-8">
            <input type="number" name="idprod" class="form-control" required>
          </div>
        </div>

        <!-- NOME -->
        <div class="row mb-4">
          <label class="col-sm-4 col-form-label text-danger">
            Nome
          </label>
          <div class="col-sm-8">
            <input type="text" name="nome" class="form-control" required>
          </div>
        </div>

        <!-- TIPO -->
        <div class="row mb-4">
          <label class="col-sm-4 col-form-label text-danger">
            Tipo de Roupa
          </label>
          <div class="col-sm-8">
            <input type="text" name="tipo" class="form-control" required>
          </div>
        </div>

        <!-- SESSÃO -->
        <div class="row mb-4">
          <label class="col-sm-4 col-form-label text-danger">
            Sessão
          </label>
          <div class="col-sm-8">
            <input type="text" name="sessao" class="form-control" required>
          </div>
        </div>

        <!-- BOTÃO -->
        <div class="text-center mt-4">
          <button type="submit" class="btn btn-danger px-5 rounded-pill">
            Cadastrar
          </button>
        </div>

      </form>
    </div>

    <!-- IMAGEM -->
    <div class="col-md-6 text-center">
      <div class="border border-danger rounded-4 p-4 d-inline-block"
           style="width: 200px; height: 200px;">

        <img src=""
             class="img-fluid"
             style="max-width: 100%; max-height: 100%; object-fit: contain;">
      </div>
    </div>

  </div>
</div>

</body>
</html>

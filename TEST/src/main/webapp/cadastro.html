<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* HEADER */
.header {
  background: linear-gradient(to right, #5b1c1c, #1f2b5c);
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>

</head>

<body class="bg-secondary-subtle">

<!-- HEADER NOVO -->
<div class="header">
  <img src="img/zyro.png" class="img-fluid" style="max-height: 200px;">
</div>

<!-- TÍTULO -->
<div class="container text-center mt-4">
  <h2 class="text-danger">Cadastro de Produtos</h2>
</div>

<!-- FORM -->
<div class="container mt-5">
  <div class="row align-items-center">

    <div class="col-md-6">
      <form>

        <div class="row mb-4">
          <label class="col-sm-4 col-form-label text-danger">
            Código da Roupa
          </label>
          <div class="col-sm-8">
            <input type="text" class="form-control">
          </div>
        </div>

        <div class="row mb-4">
          <label class="col-sm-4 col-form-label text-danger">
            Tipo de Roupa
          </label>
          <div class="col-sm-8">
            <input type="text" class="form-control">
          </div>
        </div>

        <div class="row mb-4">
          <label class="col-sm-4 col-form-label text-danger">
            Sessão
          </label>
          <div class="col-sm-8">
            <input type="text" class="form-control">
          </div>
        </div>

      </form>
    </div>

    <div class="col-md-6 text-center">
      <div class="border border-danger rounded-4 p-4 d-inline-block"
     style="width: 200px; height: 200px;">

  <img src="img/1.png"
       class="img-fluid"
       style="max-width: 100%; max-height: 100%; object-fit: contain;">

</div>

      <div class="mt-4">
        <button class="btn btn-danger px-5 rounded-pill">
          Enviar
        </button>
      </div>
    </div>

  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Moda</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background-color: #bfc3c9;
}

/* HEADER */
.header {
	background: linear-gradient(to right, #5b1c1c, #1f2b5c);
	height: 120px;
	display: flex;
	align-items: center;
	justify-content: center;
}

.header img {
	max-height: 200px;
}

/* CARD */
.card {
	max-width: 200px;
	margin: auto;
	border-radius: 15px;
	transition: 0.3s;
}

.card:hover {
	transform: scale(1.05);
}

/* IMAGEM */
.card-img-top {
	height: 150px;
	object-fit: contain;
	padding: 10px;
}

/* TEXTO */
.card-body {
	padding: 8px;
}

/* BOTÃO */
.btn-custom {
	background-color: #1f2b5c;
	color: white;
	border-radius: 30px;
	padding: 10px 30px;
}

.btn-custom:hover {
	background-color: #162047;
}
</style>
</head>

<body>

	<!-- HEADER -->
	<div class="header">
		<img src="img/zyro.png" alt="logo">
	</div>

	<!-- PRODUTOS -->
	<div class="container text-center mt-4">
		<h1>Produtos</h1>
	</div>
	<div class="container mt-5">
		<div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4">

			<!-- PRODUTO -->
			<div class="col">
				<div class="card">
					<img src="img/1.png" class="card-img-top">
					<div class="card-body text-center">
						<h6 class="mb-0">Código: 1</h6>
					</div>
				</div>
			</div>

			<div class="col">
				<div class="card">
					<img src="img/2.png" class="card-img-top">
					<div class="card-body text-center">
						<h6 class="mb-0">Código: 2</h6>
					</div>
				</div>
			</div>

			<div class="col">
				<div class="card">
					<img src="img/3.png" class="card-img-top">
					<div class="card-body text-center">
						<h6 class="mb-0">Código: 3</h6>
					</div>
				</div>
			</div>

			<div class="col">
				<div class="card">
					<img src="img/4.png" class="card-img-top">
					<div class="card-body text-center">
						<h6 class="mb-0">Código: 4</h6>
					</div>
				</div>
			</div>

			<div class="col">
				<div class="card">
					<img src="img/5.png" class="card-img-top">
					<div class="card-body text-center">
						<h6 class="mb-0">Código: 5</h6>
					</div>
				</div>
			</div>

			<!-- LINHA 2 -->
			<div class="col">
				<div class="card">
					<img src="img/6.png" class="card-img-top">
					<div class="card-body text-center">
						<h6 class="mb-0">Código: 6</h6>
					</div>
				</div>
			</div>

			<div class="col">
				<div class="card">
					<img src="img/7.png" class="card-img-top">
					<div class="card-body text-center">
						<h6 class="mb-0">Código: 7</h6>
					</div>
				</div>
			</div>

			<div class="col">
				<div class="card">
					<img src="img/8.png" class="card-img-top">
					<div class="card-body text-center">
						<h6 class="mb-0">Código: 8</h6>
					</div>
				</div>
			</div>

			<div class="col">
				<div class="card">
					<img src="img/9.png" class="card-img-top">
					<div class="card-body text-center">
						<h6 class="mb-0">Código: 9</h6>
					</div>
				</div>
			</div>

			<div class="col">
				<div class="card">
					<img src="img/10.png" class="card-img-top">
					<div class="card-body text-center">
						<h6 class="mb-0">Código: 10</h6>
					</div>
				</div>
			</div>

		</div>

		<!-- BOTÃO -->
		<div class="text-center mt-5">
			<a class="btn btn-custom text-black" href="cadastro.html">Cadastrar
				Produto</a>
		</div>
	</div>

</body>
</html>

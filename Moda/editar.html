<!-- DEVE SER O ARQUIVO .JSP-->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>Agenda de Contatos</title>
    <link rel="shortcut icon" href="img/favicon_fone.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container bs-warning-border-subtle bs-primary-bg-subtle text-center py-3">
	
        <h1 class="text-light-emphasis">Produtos</h1>
        
        
        
        <!-- ADICIONAR A TABELA 23-03 -->
        <table class="table">
  <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Cód da Roupa</th>
      <th scope="col">Tipo de Roupa</th>
      <th scope="col">Sessão</th>
      <th scope="col">Opções</th>
      
    </tr>
  </thead>
  <tbody class="table-group-divider">
   <% for (int i = 0; i <lista.size(); i++) { %>
    <tr>
      <th scope="row">
            <%=lista.get(i).getIdcon() %>
      </th>
      <td> 
            <%=lista.get(i).getCod() %>
      </td>
      <td>
            <%=lista.get(i).getTipo() %>
      </td>
      <td>
            <%=lista.get(i).getSessao() %>
      </td>
      <td>
      <a href="select?idcon=<%= lista.get(i).getIdcon()%>" class="btn"
        style="--bs-btn-bg: #12114A; 
               --bs-btn-color: #fff; 
               --bs-btn-hover-bg: #12114A; 
               --bs-btn-hover-color: #fff;
               --bs-btn-border-color: #12114A;">Editar</a>
      <a href="javascript:confirmar(<%=lista.get(i).getIdcon() %>)" 
        class="btn"
        style="--bs-btn-bg: #3A0716; 
               --bs-btn-color: #fff; 
               --bs-btn-hover-bg: #3A0716; 
               --bs-btn-hover-color: #fff;
               --bs-btn-border-color: #3A0716;">Excluir</a>
      
      </td>
    </tr>
    <% } %>
  </tbody>
</table>
<a class="btn"
         style="--bs-btn-bg: #12114A; 
               --bs-btn-color: #fff; 
               --bs-btn-hover-bg: #12114A; 
               --bs-btn-hover-color: #fff;
               --bs-btn-border-color: #12114A;" href="novo.html">Novo Contato</a>
        
        <a class="btn"
         style="--bs-btn-bg: #12114A; 
               --bs-btn-color: #fff; 
               --bs-btn-hover-bg: #12114A; 
               --bs-btn-hover-color: #fff;
               --bs-btn-border-color: #12114A;" href="report">Relatório</a>
<!-- Fim da Tabela 23-03 -->
    </div>    
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
     <script src="scripts/confirmar.js"></script>

</body>
</html>
